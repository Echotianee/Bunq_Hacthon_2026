<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>travel buddy — by bunq</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="travel buddy">
<meta name="theme-color" content="#00A6FF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0F0ED;
    --bg-dot: rgba(0,0,0,0.055);
    --surface: #FFFFFF;
    --surface-2: #F5F5F3;
    --surface-3: #EBEBEA;
    --border: rgba(0,0,0,0.07);
    --border-strong: rgba(0,0,0,0.13);
    --text: #141413;
    --text-muted: #6B6B68;
    --text-hint: #9A9A97;
 
    /* bunq brand */
    --bunq: #00A6FF;
    --bunq-dark: #0088D4;
    --bunq-pale: #E6F5FF;
    --bunq-mid: rgba(0,166,255,0.12);
 
    /* semantic */
    --success: #1DB87A;
    --success-bg: #E3F8EE;
    --success-dark: #0F7A51;
    --coral: #E05A3A;
    --coral-bg: #FCEEE9;
    --amber: #C47A00;
    --amber-bg: #FFF6E0;
 
    /* shape */
    --r-sm: 10px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 26px;
    --r-pill: 100px;
 
    /* shadow */
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.07);
    --shadow-phone: 0 24px 80px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.10);
    --shadow-btn: 0 2px 8px rgba(0,166,255,0.32);
    --shadow-btn-hover: 0 6px 20px rgba(0,166,255,0.44);
 
    /* bunq rainbow */
    --rainbow: linear-gradient(90deg,
      #00A6FF 0%,
      #00C4D4 22%,
      #1DB87A 44%,
      #FFC94A 66%,
      #FF6B9D 88%,
      #B06EFF 100%);
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    /* subtle dot grid — bunq uses geometric patterns */
    background-image: radial-gradient(circle, var(--bg-dot) 1px, transparent 1px);
    background-size: 22px 22px;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    gap: 20px;
  }
 
  /* ─── LIVE BANNER ─── */
  .live-banner {
    font-size: 12px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: var(--r-pill);
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.01em;
    transition: background 0.4s, color 0.4s;
  }
  .live-banner.live  { background: var(--success-bg); color: var(--success-dark); }
  .live-banner.mock  { background: var(--surface-3); color: var(--text-muted); }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.4s;
  }
  .live .live-dot { background: var(--success); animation: pulse-green 2s infinite; }
  .mock .live-dot { background: var(--text-hint); }
 
  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(29,184,122,0.5); }
    50%       { box-shadow: 0 0 0 5px rgba(29,184,122,0); }
  }
 
  /* ─── STAGE (outer frame) ─── */
  .stage {
    background: linear-gradient(160deg, #E8E8E5 0%, #DDDDD9 100%);
    border-radius: var(--r-xl);
    padding: 32px 28px;
    display: flex;
    justify-content: center;
    width: 100%;
    max-width: 480px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 2px 0 rgba(0,0,0,0.08);
  }
 
  /* ─── PHONE ─── */
  .phone {
    width: 100%;
    max-width: 360px;
    background: var(--surface);
    border-radius: var(--r-xl);
    border: 0.5px solid rgba(0,0,0,0.10);
    overflow: hidden;
    box-shadow: var(--shadow-phone);
  }
 
  .status-bar {
    padding: 11px 22px 2px;
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-hint);
    letter-spacing: 0.02em;
  }
 
  /* rainbow stripe — sits between status bar and header */
  .rainbow-stripe {
    height: 3px;
    background: var(--rainbow);
    opacity: 0.85;
  }
 
  /* ─── HEADER ─── */
  .header {
    padding: 10px 20px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .brand-logo { display: flex; align-items: center; gap: 9px; }
  .brand-plane { width: 24px; height: 24px; flex-shrink: 0; }
  .brand-text { display: flex; flex-direction: column; line-height: 1; }
  .brand-name { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .brand-attr { font-size: 9px; color: var(--text-hint); margin-top: 2.5px; letter-spacing: 0.15px; font-weight: 500; }
  .bunq-wordmark { font-weight: 700; color: var(--bunq); }
/* ─── BUNQ HOME (Scene 0) ─── */
  .bunq-home { padding: 4px 2px; }
  .bh-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding: 0 2px; }
  .bh-bunq { font-size: 26px; font-weight: 700; letter-spacing: -0.6px; color: var(--bunq); line-height: 1; }
  .bh-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .bh-balance {
    background: var(--bunq);
    border-radius: 14px;
    padding: 16px 18px;
    color: white;
    margin-bottom: 18px;
  }
  .bh-balance-label { font-size: 10.5px; opacity: 0.88; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .bh-balance-amt { font-size: 26px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; line-height: 1.1; }
  .bh-balance-sub { font-size: 11px; opacity: 0.85; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .bh-section-label { font-size: 10px; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; font-weight: 700; padding: 0 2px; }
  .bh-row {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 2px;
    border-bottom: 1px solid var(--border);
  }
  .bh-row:last-of-type { border-bottom: none; }
  .bh-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--surface-2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .bh-row-text { flex: 1; }
  .bh-row-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .bh-row-meta { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }
  .bh-arrow { color: var(--text-hint); font-size: 16px; font-weight: 300; }
  .bh-tb {
    background: linear-gradient(180deg, rgba(0,133,255,0.07), rgba(0,133,255,0.02));
    border: 1.5px solid rgba(0,133,255,0.32);
    border-radius: 14px;
    padding: 14px;
    margin-top: 6px;
    margin-bottom: 8px;
    position: relative;
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .bh-tb-hero {
    padding: 16px 14px 14px;
    box-shadow: 0 2px 10px rgba(0,133,255,0.08);
  }
  .bh-tb:hover { transform: translateY(-1px); border-color: rgba(0,133,255,0.55); box-shadow: 0 4px 14px rgba(0,133,255,0.14); }
  .bh-tb:active { transform: translateY(0); }
  .bh-tb-new {
    position: absolute; top: -8px; right: 12px;
    background: var(--bunq); color: white;
    font-size: 9px; font-weight: 700; padding: 3px 8px;
    border-radius: 100px; letter-spacing: 0.5px;
  }
  .bh-tb-row { display: flex; align-items: center; gap: 12px; }
  .bh-tb-icon {
    width: 44px; height: 44px; border-radius: 11px;
    background: white;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    box-shadow: 0 1px 3px rgba(0,133,255,0.20);
  }
  .bh-tb-name { font-size: 15px; font-weight: 700; color: var(--bunq); letter-spacing: -0.2px; }
  .bh-tb-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .bh-tb-arrow { color: var(--bunq); font-size: 20px; font-weight: 400; }
  .bh-tb-trip {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,133,255,0.18);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bh-tb-trip-line {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text-muted);
    line-height: 1.35;
  }
  .bh-tb-trip-line strong { color: var(--text); font-weight: 600; }
  .bh-tb-trip-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
    animation: bh-trip-pulse 2.2s infinite ease-in-out;
  }
  @keyframes bh-trip-pulse {
    0%,100% { opacity: 0.55; transform: scale(0.85); }
    50%     { opacity: 1; transform: scale(1.15); }
  }
  .bh-tb-fx-up {
    color: var(--success);
    font-weight: 800;
    font-size: 12px;
    line-height: 1;
    flex-shrink: 0;
    width: 10px; text-align: center;
  }
  .bh-tap-hint {
    text-align: center; color: var(--text-hint);
    font-size: 11px; padding: 14px 0 6px;
  }
  .bh-tap-arrow {
    display: inline-block;
    animation: bh-bounce 1.4s infinite ease-in-out;
    color: var(--bunq); font-weight: 700;
  }
  @keyframes bh-bounce {
    0%,100% { transform: translateY(0); opacity: 0.65; }
    50%     { transform: translateY(3px); opacity: 1; }
  }
  /* dark mode tweaks for bunq home */
  @media (prefers-color-scheme: dark) {
    .bh-tb { background: linear-gradient(180deg, rgba(77,167,255,0.12), rgba(77,167,255,0.04)); border-color: rgba(77,167,255,0.45); }
    .bh-tb-icon { background: var(--surface); }
  }
 
  .pill {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: var(--r-pill);
    background: var(--bunq-pale);
    color: var(--bunq);
    letter-spacing: 0.01em;
    transition: all 0.25s ease;
  }
